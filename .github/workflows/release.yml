name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS and Windows
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --registry=https://registry.npmjs.org --foreground-scripts

      - name: Write runtime config
        run: node scripts/write-runtime-config.js
        env:
          DISPATCHER_URLS: ${{ secrets.DISPATCHER_URLS }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_BRAND: portnest
          LOCAL_SOCKS_HINT: "1080"

      - name: Build
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            npm run dist:mac -- --publish never
          else
            npm run dist:win -- --publish never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-build
          path: dist/mac
      - uses: actions/download-artifact@v4
        with:
          name: windows-latest-build
          path: dist/win

      - name: Create / Update Draft Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/mac/*.dmg
            dist/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}