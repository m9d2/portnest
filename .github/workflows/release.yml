name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            latest: latest-darwin-aarch64.json
          - name: macOS x64
            os: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            latest: latest-darwin-x86_64.json
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            latest: latest-windows-x86_64.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: npm ci --registry=https://registry.npmjs.org --foreground-scripts

      - name: Write runtime config
        run: node scripts/write-runtime-config.js
        env:
          DISPATCHER_URLS: ${{ secrets.DISPATCHER_URLS }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_BRAND: portnest
          LOCAL_SOCKS_HINT: "1080"

      - name: Build Tauri app
        run: npm run tauri:build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare upload artifacts
        shell: bash
        run: |
          mkdir -p upload
          find src-tauri/target -path '*/bundle/dmg/*.dmg' -exec cp {} upload/ \;
          app_tar="$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz' -print -quit)"
          if [ -n "$app_tar" ]; then
            cp "$app_tar" "upload/PortNest_${{ github.ref_name }}_${{ matrix.target }}.app.tar.gz"
            cp "$app_tar.sig" "upload/PortNest_${{ github.ref_name }}_${{ matrix.target }}.app.tar.gz.sig"
          fi
          exe="$(find src-tauri/target -path '*/bundle/nsis/*.exe' -print -quit)"
          if [ -n "$exe" ]; then
            cp "$exe" "upload/PortNest_${{ github.ref_name }}_${{ matrix.target }}.exe"
            cp "$exe.sig" "upload/PortNest_${{ github.ref_name }}_${{ matrix.target }}.exe.sig"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            upload/*

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge updater manifests
        run: node scripts/merge-tauri-latest.js dist "${{ github.ref_name }}" m9d2/portnest

      - name: Publish Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.app.tar.gz.sig
            dist/**/*.exe
            dist/**/*.exe.sig
            dist/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
