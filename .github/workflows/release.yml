name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac:
    name: Build macOS arm64 and x64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --registry=https://registry.npmjs.org --foreground-scripts
        timeout-minutes: 15

      - name: Write runtime config
        run: node scripts/write-runtime-config.js
        env:
          DISPATCHER_URLS: ${{ secrets.DISPATCHER_URLS }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_BRAND: portnest
          LOCAL_SOCKS_HINT: "1080"

      - name: Build and publish macOS releases
        run: npm run dist:mac:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --registry=https://registry.npmjs.org --foreground-scripts
        timeout-minutes: 15

      - name: Write runtime config
        run: node scripts/write-runtime-config.js
        env:
          DISPATCHER_URLS: ${{ secrets.DISPATCHER_URLS }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_BRAND: portnest
          LOCAL_SOCKS_HINT: "1080"

      - name: Build and publish Windows x64 release
        run: npm run dist:win:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
