name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac:
    name: Build macOS arm64 and x64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Write runtime config
        run: node scripts/write-runtime-config.js
        env:
          DISPATCHER_URLS: ${{ secrets.DISPATCHER_URLS }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_BRAND: portnest
          LOCAL_SOCKS_HINT: "1080"

      - name: Add macOS x64 tunnel binaries
        run: |
          mkdir -p bin/darwin-x64
          curl -L -o /tmp/frp_darwin_amd64.tar.gz https://github.com/fatedier/frp/releases/download/v0.62.1/frp_0.62.1_darwin_amd64.tar.gz
          tar -xzf /tmp/frp_darwin_amd64.tar.gz -C /tmp
          cp /tmp/frp_0.62.1_darwin_amd64/frpc bin/darwin-x64/frpc

          curl -L -o /tmp/gost_darwin_amd64.tar.gz https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-darwin-amd64-2.11.5.gz
          gunzip -c /tmp/gost_darwin_amd64.tar.gz > bin/darwin-x64/gost
          chmod +x bin/darwin-x64/frpc bin/darwin-x64/gost

      - name: Build and publish macOS releases
        run: npm run dist:mac:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
